<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>INOVA — TERMINAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #050505;
  --card: #0a0a0a;
  --ink: #ffffff;
  --accent: #00ff41; /* Matrix/Terminal Green */
  --danger: #ff0000;
  --border: #1a1a1a;
  --secondary: #111111;
}

/* Custom Scrollbar */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: var(--bg);
}
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: #333;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  margin: 0;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Dashboard Layout */
.sidebar {
  width: 320px;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 30px;
}

.main-content {
  flex: 1;
  padding: 120px 60px 60px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  position: relative;
}

/* Profile Card */
.profile-card {
  border-left: 2px solid var(--accent);
  padding-left: 20px;
}

.profile-card h2 {
  margin: 0 0 5px 0;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.profile-card p {
  margin: 2px 0;
  font-size: 13px;
  opacity: 0.5;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.status-indicator {
  margin-top: 20px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-in { color: var(--accent); }
.status-out { color: var(--danger); }

/* Clock Controls */
.clock-section {
  text-align: center;
  width: 100%;
  max-width: 600px;
}

.digital-clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 80px;
  font-weight: 500;
  margin-bottom: 40px;
  letter-spacing: -2px;
}

.btn-group {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.clock-btn {
  flex: 1;
  height: 80px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--ink);
  font-size: 14px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-in:hover:not(:disabled) { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-out:hover:not(:disabled) { background: var(--danger); color: #fff; border-color: var(--danger); }

.clock-btn:disabled {
  opacity: 0.1;
  cursor: not-allowed;
}

.undo-btn {
  margin-top: 20px;
  background: transparent;
  border: 1px solid var(--border);
  color: rgba(255,255,255,0.3);
  padding: 8px 16px;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.undo-btn:hover { color: var(--danger); border-color: var(--danger); }

/* Table Section */
.history-section {
  width: 100%;
  max-width: 900px;
  margin-top: 60px;
}

.history-section h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 3px;
  opacity: 0.3;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 15px;
  opacity: 0.4;
  border-bottom: 1px solid var(--border);
}

td {
  padding: 15px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
}

tbody tr:nth-child(odd) { background: rgba(255,255,255,0.02); }
tbody tr:nth-child(even) { background: transparent; }
tbody tr:hover { background: rgba(0,255,65,0.05); }

.live-row {
  color: var(--accent);
  font-weight: 800;
}

.total-row td {
  font-weight: 800;
  color: var(--accent);
  border-top: 2px solid var(--border);
}

/* Branding */
.branding {
  position: absolute;
  top: 40px;
  right: 40px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
}

.brand-name {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 2px;
}

.brand-sub {
  font-size: 9px;
  opacity: 0.4;
  text-transform: uppercase;
  letter-spacing: 4px;
}

.logout-btn {
  margin-top: auto;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 12px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
}

.logout-btn:hover { background: #fff; color: #000; }

</style>
</head>
<body>

<div class="sidebar">
  <div class="profile-card">
    <h2 id="profName">---</h2>
    <p id="profEmail">---</p>
    <p id="profRole">---</p>
    <div id="statusIndicator" class="status-indicator">
      <span id="statusDot">●</span> <span id="statusText">OFFLINE</span>
    </div>
    <div style="margin-top: 20px; font-size: 10px; opacity: 0.4; letter-spacing: 1px; text-transform: uppercase; border-top: 1px solid var(--border); padding-top: 15px;">
      Period: <span id="ppRange" style="color: var(--ink); opacity: 1; font-weight: 600;">---</span>
    </div>
  </div>
  
  <button id="logoutBtn" class="logout-btn">TERMINATE SESSION</button>
</div>

<div class="main-content">
  <div class="branding">
    <div class="brand-name">INOVA</div>
    <div class="brand-sub">WORKFORCE MANAGEMENT</div>
  </div>
  <div class="clock-section">
    <div id="digitalClock" class="digital-clock">00:00:00</div>
    <div class="btn-group">
      <button id="inBtn" class="clock-btn btn-in" disabled>CLOCK IN</button>
      <button id="outBtn" class="clock-btn btn-out" disabled>CLOCK OUT</button>
    </div>
    <button id="undoBtn" class="undo-btn">UNDO LAST ACTION</button>
  </div>

  <div class="history-section">
    <h3 id="sessionsHeader">YOUR WORK SESSIONS</h3>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Clock In</th>
          <th>Clock Out</th>
          <th>Hours</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
      <tfoot>
        <tr class="total-row">
          <td colspan="3" style="text-align: right;">TOTAL HOURS WORKED</td>
          <td id="totalHours">0.00</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="history-section" style="margin-top: 40px;">
    <h3 id="breakdownHeader">HOURS BY DAY</h3>
    <div style="overflow-x: auto; width: 100%; border: 1px solid var(--border); background: var(--card); padding: 10px 0;">
      <table style="min-width: 1000px; table-layout: fixed;">
        <thead id="breakdownHead"></thead>
        <tbody id="breakdownBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, serverTimestamp, deleteDoc, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyD5nYX4Wpj0OfbOJo2i3r_lD2Z11rq1RT0",
  authDomain:"hotel-payroll-markii-e21fd.firebaseapp.com",
  projectId:"hotel-payroll-markii-e21fd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const hotelId = "baymont_springfield";

let currentUid = null;
let currentProfile = null;
let currentLogs = [];

function formatStopwatch(hoursDecimal) {
  const totalMinutes = Math.floor(hoursDecimal * 60);
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  return `${h}h ${String(m).padStart(2, '0')}m`;
}

// Digital Clock & Real-time Updates
setInterval(() => {
  const now = new Date();
  document.getElementById("digitalClock").innerText = now.toLocaleTimeString('en-US', { hour12: true });
  
  // Real-time status text update if clocked in
  if (currentLogs.length > 0) {
    const last = currentLogs[currentLogs.length - 1];
    if (last && last.type === "clockIn") {
      const pending = last.timestamp?.toDate() || new Date();
      const liveHours = (new Date() - pending) / (1000 * 60 * 60);
      document.getElementById("statusText").innerText = `ACTIVE — ${formatStopwatch(liveHours)}`;
    }
  }
}, 60000);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }
  
  currentUid = user.uid;
  const docRef = doc(db, "hotels", hotelId, "employees", user.uid);
  const snap = await getDoc(docRef);
  
  if (!snap.exists() || snap.data().status === "disabled") {
    await signOut(auth);
    alert("Access Denied. Contact management.");
    window.location.href = "index.html";
    return;
  }
  
  currentProfile = snap.data();
  updateProfileUI();
  updatePayPeriodInfo();
  loadPayPeriodData();
});

function updateProfileUI() {
  document.getElementById("profName").innerText = currentProfile.name;
  document.getElementById("profEmail").innerText = currentProfile.email;
  document.getElementById("profRole").innerText = currentProfile.role;
}

function updatePayPeriodInfo() {
  const now = new Date();
  const pp = payPeriodId(now);
  const year = now.getFullYear();
  const jan1 = new Date(year, 0, 1);
  const diff = Math.floor((now - jan1) / (1000 * 60 * 60 * 24));
  const p = Math.floor(diff / 14);
  const start = new Date(year, 0, 1 + p * 14);
  const end = new Date(year, 0, 1 + p * 14 + 13);
  
  const rangeStr = `${start.getMonth() + 1}/${start.getDate()} - ${end.getMonth() + 1}/${end.getDate()}`;
  
  document.getElementById("sessionsHeader").innerText = `YOUR WORK SESSIONS FOR ${rangeStr}`;
  document.getElementById("breakdownHeader").innerText = `HOURS BY DAY (${rangeStr})`;
  document.getElementById("ppRange").innerText = rangeStr;
}

async function loadPayPeriodData() {
  const pp = payPeriodId(new Date());
  const logsCol = collection(db, "hotels", hotelId, "logs");
  
  const q = query(logsCol, 
    where("uid", "==", currentUid),
    where("payPeriodId", "==", pp)
  );
  
  const snap = await getDocs(q);
  let logs = [];
  snap.forEach(d => logs.push(d.data()));
  
  logs.sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
  currentLogs = logs;
  
  renderHistory(logs);
  updateStatus(logs);
  renderDailyBreakdown(logs);
}

function renderHistory(logs) {
  const body = document.getElementById("historyBody");
  body.innerHTML = "";
  
  let sessions = [];
  let pending = null;
  let totalHours = 0;
  
  logs.forEach(l => {
    if (l.type === "clockIn") {
      pending = l.timestamp?.toDate() || new Date();
    } else if (l.type === "clockOut" && pending) {
      const out = l.timestamp?.toDate() || new Date();
      const hours = (out - pending) / (1000 * 60 * 60);
      sessions.push({
        date: pending.toLocaleDateString(),
        in: pending.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        out: out.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        hours: hours,
        isLive: false
      });
      totalHours += hours;
      pending = null;
    }
  });

  // Handle Live Active Session
  if (pending) {
    const now = new Date();
    const liveHours = (now - pending) / (1000 * 60 * 60);
    sessions.push({
      date: pending.toLocaleDateString(),
      in: pending.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
      out: "LIVE",
      hours: liveHours,
      isLive: true
    });
    totalHours += liveHours;
  }
  
  sessions.reverse().forEach(s => {
    const tr = document.createElement("tr");
    if (s.isLive) tr.className = "live-row";
    tr.innerHTML = `
      <td>${s.date}</td>
      <td>${s.in}</td>
      <td>${s.out}</td>
      <td>${s.isLive ? formatStopwatch(s.hours) : s.hours.toFixed(2)}</td>
    `;
    body.appendChild(tr);
  });
  
  document.getElementById("totalHours").innerText = totalHours.toFixed(2);
}

function renderDailyBreakdown(logs) {
  const head = document.getElementById("breakdownHead");
  const body = document.getElementById("breakdownBody");
  if (!head || !body) return;

  const now = new Date();
  const pp = payPeriodId(now);
  const parts = pp.split("_PP_");
  const year = parseInt(parts[0]);
  const pNum = parseInt(parts[1]);
  
  const jan1 = new Date(year, 0, 1);
  const ppStart = new Date(year, 0, 1 + (pNum - 1) * 14);
  const ppStartMidnight = new Date(ppStart.getFullYear(), ppStart.getMonth(), ppStart.getDate()).getTime();
  
  let days = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(ppStart.getFullYear(), ppStart.getMonth(), ppStart.getDate() + i);
    days.push({
      dateStr: (d.getMonth() + 1) + "/" + d.getDate(),
      hours: 0
    });
  }

  let pending = null;
  logs.forEach(l => {
    if (l.type === "clockIn") {
      pending = l.timestamp?.toDate() || new Date();
    } else if (l.type === "clockOut" && pending) {
      const out = l.timestamp?.toDate() || new Date();
      const hours = (out - pending) / (1000 * 60 * 60);
      const sessionStartMidnight = new Date(pending.getFullYear(), pending.getMonth(), pending.getDate()).getTime();
      const dayIdx = Math.round((sessionStartMidnight - ppStartMidnight) / (1000 * 60 * 60 * 24));
      if (dayIdx >= 0 && dayIdx < 14) days[dayIdx].hours += hours;
      pending = null;
    }
  });

  if (pending) {
    const liveHours = (new Date() - pending) / (1000 * 60 * 60);
    const sessionStartMidnight = new Date(pending.getFullYear(), pending.getMonth(), pending.getDate()).getTime();
    const dayIdx = Math.round((sessionStartMidnight - ppStartMidnight) / (1000 * 60 * 60 * 24));
    if (dayIdx >= 0 && dayIdx < 14) days[dayIdx].hours += liveHours;
  }

  head.innerHTML = "<tr>" + days.map(d => `<th style="text-align: center;">${d.dateStr}</th>`).join("") + "</tr>";
  body.innerHTML = "<tr>" + days.map(d => {
    const val = d.hours > 0 ? d.hours.toFixed(1) : "-";
    return `<td style="text-align: center; font-family: 'JetBrains Mono', monospace;">${val}</td>`;
  }).join("") + "</tr>";
}

function updateStatus(logs) {
  const last = logs[logs.length - 1];
  const isClockedIn = last && last.type === "clockIn";
  
  const indicator = document.getElementById("statusIndicator");
  const text = document.getElementById("statusText");
  const inBtn = document.getElementById("inBtn");
  const outBtn = document.getElementById("outBtn");
  
  if (isClockedIn) {
    const pending = last.timestamp?.toDate() || new Date();
    const liveHours = (new Date() - pending) / (1000 * 60 * 60);
    indicator.className = "status-indicator status-in";
    text.innerText = `ACTIVE — ${formatStopwatch(liveHours)}`;
    inBtn.disabled = true;
    outBtn.disabled = false;
  } else {
    indicator.className = "status-indicator status-out";
    text.innerText = "OFFLINE";
    inBtn.disabled = false;
    outBtn.disabled = true;
  }
}

async function writeEvent(type) {
  const inBtn = document.getElementById("inBtn");
  const outBtn = document.getElementById("outBtn");
  
  // Prevent double clicks
  inBtn.disabled = true;
  outBtn.disabled = true;

  const pp = payPeriodId(new Date());
  try {
    await addDoc(collection(db, "hotels", hotelId, "logs"), {
      uid: currentUid,
      name: currentProfile.name,
      type: type,
      timestamp: serverTimestamp(),
      payPeriodId: pp
    });
    await loadPayPeriodData();
  } catch (e) {
    alert("Error recording event: " + e.message);
    updateStatus(currentLogs); // Re-enable based on last state
  }
}

async function undoLastAction() {
  const undoBtn = document.getElementById("undoBtn");
  const originalText = undoBtn.innerText;
  undoBtn.disabled = true;
  undoBtn.innerText = "PROCESSING...";

  const logsCol = collection(db, "hotels", hotelId, "logs");
  const q = query(logsCol, 
    where("uid", "==", currentUid),
    orderBy("timestamp", "desc"),
    limit(1)
  );
  
  try {
    const snap = await getDocs(q);
    if (snap.empty) {
      alert("No logs found to undo.");
      return;
    }
    
    const lastDoc = snap.docs[0];
    const data = lastDoc.data();
    const ts = data.timestamp?.toDate();
    
    if (!ts) {
      alert("Cannot undo: Timestamp missing.");
      return;
    }

    const diffMinutes = (new Date() - ts) / (1000 * 60);
    if (diffMinutes <= 2) {
      await deleteDoc(lastDoc.ref);
      await loadPayPeriodData();
    } else {
      alert("Undo window expired (2 minutes max)");
    }
  } catch (e) {
    alert("Error performing undo: " + e.message);
  } finally {
    undoBtn.disabled = false;
    undoBtn.innerText = originalText;
  }
}

document.getElementById("inBtn").onclick = () => writeEvent("clockIn");
document.getElementById("outBtn").onclick = () => writeEvent("clockOut");
document.getElementById("undoBtn").onclick = undoLastAction;
document.getElementById("logoutBtn").onclick = () => signOut(auth);

// Shared utility — keep in sync across index.html, terminal.html, manager.html
function payPeriodId(date){
  const year = date.getFullYear();
  const jan1 = new Date(year, 0, 1);
  const diff = Math.floor((date - jan1) / (1000 * 60 * 60 * 24));
  const p = Math.floor(diff / 14) + 1;
  return `${year}_PP_${String(p).padStart(2, "0")}`;
}

</script>
</body>
</html>
