<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>INOVA — TERMINAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #050505;
  --card: #0a0a0a;
  --ink: #ffffff;
  --accent: #00ff41; /* Matrix/Terminal Green */
  --danger: #ff0000;
  --border: #1a1a1a;
  --secondary: #111111;
}

/* Custom Scrollbar */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: var(--bg);
}
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: #333;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  margin: 0;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Dashboard Layout */
.sidebar {
  width: 320px;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 30px;
}

.main-content {
  flex: 1;
  padding: 120px 60px 60px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  position: relative;
}

/* Profile Card */
.profile-card {
  border-left: 2px solid var(--accent);
  padding-left: 20px;
}

.profile-card h2 {
  margin: 0 0 5px 0;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.profile-card p {
  margin: 2px 0;
  font-size: 13px;
  opacity: 0.5;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.status-indicator {
  margin-top: 20px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-in { color: var(--accent); }
.status-in #statusDot { animation: pulse-dot 1.5s infinite; }
.status-out { color: var(--danger); }

@keyframes pulse-dot {
  0% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.2); }
  100% { opacity: 1; transform: scale(1); }
}

/* Clock Controls */
.clock-section {
  text-align: center;
  width: 100%;
  max-width: 600px;
}

.digital-clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 92px;
  font-weight: 500;
  margin-bottom: 40px;
  letter-spacing: -2px;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
}

.btn-group {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.clock-btn {
  flex: 1;
  height: 80px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--ink);
  font-size: 14px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}

.clock-btn:hover:not(:disabled) {
  transform: translateY(-2px);
}

.btn-in:hover:not(:disabled) { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-out:hover:not(:disabled) { background: var(--danger); color: #fff; border-color: var(--danger); }

.clock-btn:disabled {
  opacity: 0.1;
  cursor: not-allowed;
}

.undo-btn {
  margin-top: 20px;
  background: transparent;
  border: 1px solid var(--border);
  color: rgba(255,255,255,0.3);
  padding: 8px 16px;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.undo-btn:hover { color: var(--danger); border-color: var(--danger); }

/* Table Section */
.history-section {
  width: 100%;
  max-width: 900px;
  margin-top: 60px;
}

.history-section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  opacity: 0.5;
  margin-bottom: 20px;
  border-left: 2px solid var(--accent);
  padding-left: 10px;
  font-weight: 600;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 15px;
  opacity: 0.4;
  border-bottom: 1px solid var(--border);
}

td {
  padding: 15px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
}

tbody tr:nth-child(odd) { background: rgba(255,255,255,0.02); }
tbody tr:nth-child(even) { background: transparent; }
tbody tr:hover { background: rgba(0,255,65,0.05); }

.live-row {
  color: var(--accent);
  font-weight: 800;
}

.live-row td:nth-child(3) {
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.4; }
  100% { opacity: 1; }
}

.total-row td {
  font-weight: 800;
  color: var(--accent);
  border-top: 2px solid var(--border);
}

/* Branding */
.branding {
  position: absolute;
  top: 40px;
  right: 40px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
}

.brand-name {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 2px;
}

.brand-sub {
  font-size: 9px;
  opacity: 0.4;
  text-transform: uppercase;
  letter-spacing: 4px;
}

.logout-btn {
  margin-top: auto;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 12px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
}

.logout-btn:hover { background: #fff; color: #000; }

</style>
</head>
<body>

<div class="sidebar">
  <div class="profile-card">
    <h2 id="profName">---</h2>
    <p id="profEmail">---</p>
    <p id="profRole">---</p>
    <div id="statusIndicator" class="status-indicator">
      <span id="statusDot">●</span> <span id="statusText">OFFLINE</span>
    </div>
    <div style="margin-top: 20px; font-size: 10px; opacity: 0.4; letter-spacing: 1px; text-transform: uppercase; border-top: 1px solid var(--border); padding-top: 15px;">
      Period: <span id="ppRange" style="color: var(--ink); opacity: 1; font-weight: 600;">---</span>
    </div>
    <div style="margin-top: 15px;">
      <div style="font-size: 10px; opacity: 0.4; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;">View Pay Period</div>
      <select id="terminalPPSelector" style="width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; outline: none;">
      </select>
    </div>
  </div>
  
  <div id="passwordSection" style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px; display: none;">
    <div style="font-size: 10px; opacity: 0.4; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
      Security
      <button onclick="togglePasswordSection()" style="background: none; border: none; color: var(--ink); cursor: pointer; font-size: 14px; padding: 0;">×</button>
    </div>
    <input type="password" id="currentPassword" placeholder="CURRENT PASSWORD" style="width: 100%; padding: 10px; margin-bottom: 8px; background: #000; border: 1px solid var(--border); color: #fff; font-size: 11px; outline: none; box-sizing: border-box;">
    <input type="password" id="newPassword" placeholder="NEW PASSWORD" style="width: 100%; padding: 10px; margin-bottom: 8px; background: #000; border: 1px solid var(--border); color: #fff; font-size: 11px; outline: none; box-sizing: border-box;">
    <input type="password" id="confirmPassword" placeholder="CONFIRM NEW PASSWORD" style="width: 100%; padding: 10px; margin-bottom: 12px; background: #000; border: 1px solid var(--border); color: #fff; font-size: 11px; outline: none; box-sizing: border-box;">
    <button onclick="changePassword()" class="clock-btn" style="width: 100%; height: 35px; font-size: 10px; letter-spacing: 1px;">UPDATE</button>
    <div id="passwordStatus" style="margin-top: 10px; font-size: 9px; font-family: 'JetBrains Mono', monospace; display: none; line-height: 1.4;"></div>
  </div>

  <div id="sidebarFooter" style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
    <button id="togglePassBtn" class="logout-btn" style="border-color: transparent; opacity: 0.4; font-size: 9px;" onclick="togglePasswordSection()">CHANGE PASSWORD</button>
    <button id="logoutBtn" class="logout-btn">SIGN OUT</button>
  </div>
</div>

<div class="main-content">
  <div class="branding">
    <div class="brand-name">INOVA</div>
    <div class="brand-sub">EMPLOYEE PORTAL</div>
  </div>
  <div class="clock-section">
    <div id="digitalClock" class="digital-clock">00:00:00</div>
    <div class="btn-group">
      <button id="inBtn" class="clock-btn btn-in" disabled>CLOCK IN</button>
      <button id="outBtn" class="clock-btn btn-out" disabled>CLOCK OUT</button>
    </div>
    <button id="undoBtn" class="undo-btn">UNDO LAST ENTRY</button>
  </div>

  <div class="history-section">
    <h3 id="sessionsHeader">YOUR WORK SESSIONS</h3>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Clock In</th>
          <th>Clock Out</th>
          <th>Hours</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
      <tfoot>
        <tr class="total-row">
          <td colspan="3" style="text-align: right;">TOTAL HOURS WORKED</td>
          <td id="totalHours">0.00</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="history-section" style="margin-top: 40px;">
    <h3 id="breakdownHeader">HOURS BY DAY</h3>
    <div style="overflow-x: auto; width: 100%; border: 1px solid var(--border); background: var(--card); padding: 10px 0;">
      <table style="min-width: 1000px; table-layout: fixed;">
        <thead id="breakdownHead"></thead>
        <tbody id="breakdownBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, EmailAuthProvider, reauthenticateWithCredential, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, serverTimestamp, deleteDoc, limit, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyD5nYX4Wpj0OfbOJo2i3r_lD2Z11rq1RT0",
  authDomain:"hotel-payroll-markii-e21fd.firebaseapp.com",
  projectId:"hotel-payroll-markii-e21fd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const hotelId = "baymont_springfield";

let currentUid = null;
let currentProfile = null;
let currentLogs = [];

function formatStopwatch(hoursDecimal) {
  const totalMinutes = Math.floor(hoursDecimal * 60);
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  return `${h}h ${String(m).padStart(2, '0')}m`;
}

// Digital Clock & Real-time Updates
function updateClock() {
  const now = new Date();
  document.getElementById("digitalClock").innerText = now.toLocaleTimeString('en-US', { hour12: true });
}

function updateStatusText() {
  if (currentLogs.length > 0) {
    const last = currentLogs[currentLogs.length - 1];
    if (last && last.type === "clockIn") {
      const pending = last.timestamp?.toDate() || new Date();
      const liveHours = (new Date() - pending) / (1000 * 60 * 60);
      document.getElementById("statusText").innerText = `ACTIVE — ${formatStopwatch(liveHours)}`;
    }
  }
}

updateClock();
updateStatusText();
setInterval(updateClock, 1000);
setInterval(updateStatusText, 60000);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }
  
  currentUid = user.uid;
  const docRef = doc(db, "hotels", hotelId, "employees", user.uid);
  const snap = await getDoc(docRef);
  
  if (!snap.exists() || snap.data().status === "disabled") {
    await signOut(auth);
    const msgEl = document.getElementById("accessDeniedMsg");
    if (msgEl) msgEl.style.display = "flex";
    return;
  }
  
  currentProfile = snap.data();
  updateProfileUI();
  updatePayPeriodInfo();
  setupTerminalPPSelector();
  loadPayPeriodData();
});

function updateProfileUI() {
  document.getElementById("profName").innerText = currentProfile.name;
  document.getElementById("profEmail").innerText = currentProfile.email;
  document.getElementById("profRole").innerText = currentProfile.role;
}

function updatePayPeriodInfo() {
  const now = new Date();
  const pp = payPeriodId(now);
  const info = getPeriodInfo(pp);
  
  const rangeStr = `${info.start.getMonth() + 1}/${info.start.getDate()} - ${info.end.getMonth() + 1}/${info.end.getDate()}`;
  document.getElementById("ppRange").innerText = rangeStr;
}

async function loadPayPeriodData(selectedPP) {
  const pp = selectedPP || payPeriodId(new Date());
  const info = getPeriodInfo(pp);
  const isCurrentPeriod = pp === payPeriodId(new Date());

  let logs = [];
  try {
    const logsCol = collection(db, "hotels", hotelId, "logs");
    const q = query(
      logsCol,
      where("uid", "==", currentUid),
      where("timestamp", ">=", Timestamp.fromDate(info.start)),
      where("timestamp", "<=", Timestamp.fromDate(new Date(info.end.getFullYear(), info.end.getMonth(), info.end.getDate(), 23, 59, 59)))
    );
    const snap = await getDocs(q);
    snap.forEach(d => logs.push(d.data()));
  } catch (indexErr) {
    console.warn("Index not ready, falling back to client-side filter:", indexErr.message);
    try {
      const logsCol = collection(db, "hotels", hotelId, "logs");
      const q = query(logsCol, where("uid", "==", currentUid));
      const snap = await getDocs(q);
      const periodStart = info.start.getTime();
      const periodEnd = new Date(info.end.getFullYear(), info.end.getMonth(), info.end.getDate(), 23, 59, 59).getTime();
      snap.forEach(d => {
        const data = d.data();
        const ts = data.timestamp?.toDate()?.getTime();
        if (ts && ts >= periodStart && ts <= periodEnd) {
          logs.push(data);
        }
      });
    } catch (fallbackErr) {
      console.error("Fallback query also failed:", fallbackErr.message);
    }
  }

  logs.sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
  currentLogs = isCurrentPeriod ? logs : [];

  const rangeStr = (info.start.getMonth() + 1) + "/" + info.start.getDate() + " - " + (info.end.getMonth() + 1) + "/" + info.end.getDate();
  document.getElementById("sessionsHeader").innerText = "WORK SESSIONS — " + rangeStr;
  document.getElementById("breakdownHeader").innerText = "HOURS BY DAY (" + rangeStr + ")";
  document.getElementById("ppRange").innerText = rangeStr;

  renderHistory(logs);
  renderDailyBreakdown(logs, info);

  if (isCurrentPeriod) {
    updateStatus(logs);
  } else {
    document.getElementById("inBtn").disabled = true;
    document.getElementById("outBtn").disabled = true;
    const indicator = document.getElementById("statusIndicator");
    const text = document.getElementById("statusText");
    indicator.className = "status-indicator";
    indicator.style.color = "rgba(255,255,255,0.3)";
    text.innerText = "HISTORICAL VIEW";
  }
}

function renderHistory(logs) {
  const body = document.getElementById("historyBody");
  body.innerHTML = "";
  
  let sessions = [];
  let pending = null;
  let totalHours = 0;
  
  logs.forEach(l => {
    if (l.type === "clockIn") {
      pending = l.timestamp?.toDate() || new Date();
    } else if (l.type === "clockOut" && pending) {
      const out = l.timestamp?.toDate() || new Date();
      const hours = (out - pending) / (1000 * 60 * 60);
      sessions.push({
        date: pending.toLocaleDateString(),
        in: pending.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        out: out.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        hours: hours,
        isLive: false
      });
      totalHours += hours;
      pending = null;
    }
  });

  // Handle Live Active Session
  if (pending) {
    const now = new Date();
    const liveHours = (now - pending) / (1000 * 60 * 60);
    sessions.push({
      date: pending.toLocaleDateString(),
      in: pending.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
      out: "LIVE",
      hours: liveHours,
      isLive: true
    });
    totalHours += liveHours;
  }
  
  sessions.reverse().forEach(s => {
    const tr = document.createElement("tr");
    if (s.isLive) tr.className = "live-row";
    tr.innerHTML = `
      <td>${s.date}</td>
      <td>${s.in}</td>
      <td>${s.out}</td>
      <td>${s.isLive ? formatStopwatch(s.hours) : s.hours.toFixed(2)}</td>
    `;
    body.appendChild(tr);
  });
  
  document.getElementById("totalHours").innerText = totalHours.toFixed(2);
}


function updateStatus(logs) {
  const last = logs[logs.length - 1];
  const isClockedIn = last && last.type === "clockIn";
  
  const indicator = document.getElementById("statusIndicator");
  const text = document.getElementById("statusText");
  const inBtn = document.getElementById("inBtn");
  const outBtn = document.getElementById("outBtn");
  
  if (isClockedIn) {
    const pending = last.timestamp?.toDate() || new Date();
    const liveHours = (new Date() - pending) / (1000 * 60 * 60);
    indicator.className = "status-indicator status-in";
    text.innerText = `ACTIVE — ${formatStopwatch(liveHours)}`;
    inBtn.disabled = true;
    outBtn.disabled = false;
  } else {
    indicator.className = "status-indicator status-out";
    text.innerText = "OFFLINE";
    inBtn.disabled = false;
    outBtn.disabled = true;
  }
}

async function writeEvent(type) {
  const inBtn = document.getElementById("inBtn");
  const outBtn = document.getElementById("outBtn");
  
  // Prevent double clicks
  inBtn.disabled = true;
  outBtn.disabled = true;

  const pp = payPeriodId(new Date());
  try {
    await addDoc(collection(db, "hotels", hotelId, "logs"), {
      uid: currentUid,
      name: currentProfile.name,
      type: type,
      timestamp: serverTimestamp(),
      payPeriodId: pp
    });
    await loadPayPeriodData();
  } catch (e) {
    console.error("Error recording event: ", e);
    updateStatus(currentLogs); // Re-enable based on last state
  }
}

async function undoLastAction() {
  const undoBtn = document.getElementById("undoBtn");
  const originalText = undoBtn.innerText;
  undoBtn.disabled = true;
  undoBtn.innerText = "PROCESSING...";

  const logsCol = collection(db, "hotels", hotelId, "logs");
  const q = query(logsCol, 
    where("uid", "==", currentUid),
    orderBy("timestamp", "desc"),
    limit(1)
  );
  
  try {
    const snap = await getDocs(q);
    if (snap.empty) {
      undoBtn.innerText = "NO LOGS FOUND";
      setTimeout(() => { undoBtn.innerText = originalText; undoBtn.disabled = false; }, 2000);
      return;
    }
    
    const lastDoc = snap.docs[0];
    const data = lastDoc.data();
    const ts = data.timestamp?.toDate();
    
    if (!ts) {
      undoBtn.innerText = "TIMESTAMP ERROR";
      setTimeout(() => { undoBtn.innerText = originalText; undoBtn.disabled = false; }, 2000);
      return;
    }

    const diffMinutes = (new Date() - ts) / (1000 * 60);
    if (diffMinutes <= 2) {
      await deleteDoc(lastDoc.ref);
      await loadPayPeriodData();
      undoBtn.innerText = "SUCCESS";
      setTimeout(() => { undoBtn.innerText = originalText; undoBtn.disabled = false; }, 2000);
    } else {
      undoBtn.innerText = "EXPIRED (2M MAX)";
      setTimeout(() => { undoBtn.innerText = originalText; undoBtn.disabled = false; }, 2000);
    }
  } catch (e) {
    console.error("Undo error:", e);
    undoBtn.innerText = "ERROR";
    setTimeout(() => { undoBtn.innerText = originalText; undoBtn.disabled = false; }, 2000);
  }
}

document.getElementById("inBtn").onclick = () => writeEvent("clockIn");
document.getElementById("outBtn").onclick = () => writeEvent("clockOut");
document.getElementById("undoBtn").onclick = undoLastAction;
document.getElementById("logoutBtn").onclick = () => signOut(auth);

// Shared utility — keep in sync across index.html, terminal.html, manager.html
function payPeriodId(date) {
  const anchor = new Date(2026, 0, 1); // Jan 1 2026 as anchor
  const diff = Math.floor((date - anchor) / (1000 * 60 * 60 * 24));
  const p = Math.floor(diff / 14);
  const periodStart = new Date(anchor);
  periodStart.setDate(periodStart.getDate() + p * 14);
  return `${periodStart.getFullYear()}_PP_${String(p).padStart(2, "0")}`;
}

function getPeriodInfo(ppId) {
  const parts = ppId.split('_');
  const p = parseInt(parts[2]);
  const anchor = new Date(2026, 0, 1);
  const start = new Date(anchor);
  start.setDate(start.getDate() + p * 14);
  const end = new Date(start);
  end.setDate(end.getDate() + 13);
  return { start, end, label: `${start.toLocaleDateString('en-US', {month:'short', day:'numeric'})} - ${end.toLocaleDateString('en-US', {month:'short', day:'numeric'})}` };
}

function setupTerminalPPSelector() {
  const sel = document.getElementById("terminalPPSelector");
  if (!sel) return;
  sel.innerHTML = "";
  const anchor = new Date(2026, 0, 1);
  const now = new Date();
  const currentPP = payPeriodId(now);

  // Generate last 12 pay periods plus current
  for (let i = 12; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i * 14);
    const pp = payPeriodId(d);
    const info = getPeriodInfo(pp);
    const opt = document.createElement("option");
    opt.value = pp;
    opt.textContent = info.label;
    if (pp === currentPP) {
      opt.textContent += " (Current)";
      opt.selected = true;
    }
    sel.appendChild(opt);
  }

  sel.onchange = () => loadPayPeriodData(sel.value);
}

window.togglePasswordSection = () => {
  const section = document.getElementById("passwordSection");
  const btn = document.getElementById("togglePassBtn");
  if (section.style.display === "none") {
    section.style.display = "block";
    btn.style.display = "none";
  } else {
    section.style.display = "none";
    btn.style.display = "block";
  }
};

window.changePassword = async () => {
  const currentPass = document.getElementById("currentPassword").value;
  const newPass = document.getElementById("newPassword").value;
  const confirmPass = document.getElementById("confirmPassword").value;
  const status = document.getElementById("passwordStatus");

  status.style.display = "block";
  status.style.color = "var(--accent)";
  status.innerText = "PROCESSING...";

  if (!currentPass || !newPass || !confirmPass) {
    status.style.color = "#ff4444";
    status.innerText = "ALL FIELDS REQUIRED.";
    return;
  }

  if (newPass !== confirmPass) {
    status.style.color = "#ff4444";
    status.innerText = "NEW PASSWORDS DO NOT MATCH.";
    return;
  }

  if (newPass.length < 6) {
    status.style.color = "#ff4444";
    status.innerText = "PASSWORD MUST BE AT LEAST 6 CHARACTERS.";
    return;
  }

  try {
    const user = auth.currentUser;
    const credential = EmailAuthProvider.credential(user.email, currentPass);
    await reauthenticateWithCredential(user, credential);
    await updatePassword(user, newPass);
    
    status.style.color = "var(--accent)";
    status.innerText = "PASSWORD UPDATED SUCCESSFULLY.";
    
    // Clear fields
    document.getElementById("currentPassword").value = "";
    document.getElementById("newPassword").value = "";
    document.getElementById("confirmPassword").value = "";
  } catch (e) {
    status.style.color = "#ff4444";
    status.innerText = "ERROR: " + e.message.toUpperCase();
  }
};

function renderDailyBreakdown(logs, periodInfo) {
  const head = document.getElementById("breakdownHead");
  const body = document.getElementById("breakdownBody");
  if (!head || !body) return;

  const info = periodInfo || getPeriodInfo(payPeriodId(new Date()));
  const ppStartMidnight = new Date(info.start.getFullYear(), info.start.getMonth(), info.start.getDate()).getTime();

  let days = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(info.start.getFullYear(), info.start.getMonth(), info.start.getDate() + i);
    days.push({ dateStr: (d.getMonth() + 1) + "/" + d.getDate(), hours: 0 });
  }

  let pending = null;
  logs.forEach(l => {
    if (l.type === "clockIn") {
      pending = l.timestamp?.toDate() || new Date();
    } else if (l.type === "clockOut" && pending) {
      const out = l.timestamp?.toDate() || new Date();
      const hours = (out - pending) / (1000 * 60 * 60);
      const sessionStartMidnight = new Date(pending.getFullYear(), pending.getMonth(), pending.getDate()).getTime();
      const dayIdx = Math.round((sessionStartMidnight - ppStartMidnight) / (1000 * 60 * 60 * 24));
      if (dayIdx >= 0 && dayIdx < 14) days[dayIdx].hours += hours;
      pending = null;
    }
  });

  if (pending) {
    const liveHours = (new Date() - pending) / (1000 * 60 * 60);
    const sessionStartMidnight = new Date(pending.getFullYear(), pending.getMonth(), pending.getDate()).getTime();
    const dayIdx = Math.round((sessionStartMidnight - ppStartMidnight) / (1000 * 60 * 60 * 24));
    if (dayIdx >= 0 && dayIdx < 14) days[dayIdx].hours += liveHours;
  }

  head.innerHTML = "<tr>" + days.map(d => '<th style="text-align:center;">' + d.dateStr + "</th>").join("") + "</tr>";
  body.innerHTML = "<tr>" + days.map(d => {
    const val = d.hours > 0 ? d.hours.toFixed(1) : "-";
    const highlight = d.hours > 0 ? "color: var(--accent);" : "opacity: 0.3;";
    return '<td style="text-align:center; font-family:\'JetBrains Mono\',monospace; ' + highlight + '">' + val + "</td>";
  }).join("") + "</tr>";
}
